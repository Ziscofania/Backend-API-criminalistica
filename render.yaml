services:
  - type: web
    name: criminalistica-api
    env: node
    region: ohio
    plan: free
    buildCommand: npm install && npm run prisma:generate && npm run build
    startCommand: npm run start:prod
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        fromDatabase:
          name: criminalistica-db
          property: connectionString

  - type: pserv
    name: criminalistica-db
    env: postgresql
    plan: free
    region: ohio
    ipAllowList: []
    databaseName: criminalistica
    user: criminalistica_user
